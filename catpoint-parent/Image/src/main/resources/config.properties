# ------------------------------------------------------------
# Configuration file for image detection service
# ------------------------------------------------------------
# This file is intended to store configuration values related
# to the image recognition service used in the UdaSecurity project.
#
# It can be used to store settings such as:
# - AWS Rekognition credentials
# - AWS region
# - Image confidence threshold
#
# In the current version of the project, this file is not used
# because the application relies on FakeImageService or mocked
# services for testing instead of real AWS calls.
#
# This file is kept as a placeholder for future configuration.
# ------------------------------------------------------------
# Example configuration values (not currently used)

# aws.accessKeyId=YOUR_ACCESS_KEY
# aws.secretKey=YOUR_SECRET_KEY
# aws.region=us-east-1
# confidence.threshold=50
